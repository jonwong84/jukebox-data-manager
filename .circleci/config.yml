version: 2.1

jobs:
  build-and-test-grpc:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - run:
          name: Restore dependencies
          command: |
            dotnet restore "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Grpc/Jukebox.DataManager.Grpc.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Grpc.Test/Jukebox.DataManager.Grpc.Test.csproj"
      - run:
          name: Build
          command: |
            dotnet build "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Grpc/Jukebox.DataManager.Grpc.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Grpc.Test/Jukebox.DataManager.Grpc.Test.csproj" \
              --configuration Release \
              --no-restore
      - run:
          name: Test with coverage
          command: |
            mkdir -p /tmp/workspace
            dotnet test "src/Hosts/Jukebox.DataManager.Grpc.Test/Jukebox.DataManager.Grpc.Test.csproj" \
              --configuration Release \
              --no-restore \
              /p:CollectCoverage=true \
              /p:CoverletOutputFormat=opencover \
              /p:CoverletOutput="/tmp/workspace/grpc.coverage.opencover.xml"
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - grpc.coverage.opencover.xml

  build-and-test-rest:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - run:
          name: Restore dependencies
          command: |
            dotnet restore "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Rest/Jukebox.DataManager.Rest.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Rest.Test/Jukebox.DataManager.Rest.Test.csproj"
      - run:
          name: Build
          command: |
            dotnet build "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Rest/Jukebox.DataManager.Rest.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Rest.Test/Jukebox.DataManager.Rest.Test.csproj" \
              --configuration Release \
              --no-restore
      - run:
          name: Test with coverage
          command: |
            mkdir -p /tmp/workspace
            dotnet test "src/Hosts/Jukebox.DataManager.Rest.Test/Jukebox.DataManager.Rest.Test.csproj" \
              --configuration Release \
              --no-restore \
              /p:CollectCoverage=true \
              /p:CoverletOutputFormat=opencover \
              /p:CoverletOutput="/tmp/workspace/rest.coverage.opencover.xml"
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - rest.coverage.opencover.xml

  build-and-test-managers:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - run:
          name: Restore dependencies
          command: |
            dotnet restore "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers.Test/Jukebox.DataManager.Managers.Test.csproj"
      - run:
          name: Build
          command: |
            dotnet build "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers.Test/Jukebox.DataManager.Managers.Test.csproj" \
              --configuration Release \
              --no-restore
      - run:
          name: Test with coverage
          command: |
            mkdir -p /tmp/workspace
            dotnet test "src/Manager/Jukebox.DataManager.Managers.Test/Jukebox.DataManager.Managers.Test.csproj" \
              --configuration Release \
              --no-restore \
              /p:CollectCoverage=true \
              /p:CoverletOutputFormat=opencover \
              /p:CoverletOutput="/tmp/workspace/managers.coverage.opencover.xml"
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - managers.coverage.opencover.xml

  sonar-scan:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install SonarScanner
          command: |
            dotnet tool install --global dotnet-sonarscanner
            export PATH="$PATH:/root/.dotnet/tools"
            echo 'export PATH="$PATH:/root/.dotnet/tools"' >> $BASH_ENV
      - run:
          name: Restore dependencies
          command: |
            dotnet restore "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Grpc/Jukebox.DataManager.Grpc.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Rest/Jukebox.DataManager.Rest.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Grpc.Test/Jukebox.DataManager.Grpc.Test.csproj"
            dotnet restore "src/Hosts/Jukebox.DataManager.Rest.Test/Jukebox.DataManager.Rest.Test.csproj"
            dotnet restore "src/Manager/Jukebox.DataManager.Managers.Test/Jukebox.DataManager.Managers.Test.csproj"
      - run:
          name: Resolve PR Number
          command: |
            API_RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/jonwong84/jukebox-data-access/pulls?state=open&head=jonwong84:$CIRCLE_BRANCH")
            PR_NUMBER=$(echo "$API_RESPONSE" \
              | grep -o '"number": [0-9]*' | head -1 | grep -o '[0-9]*' || true)
            echo "PR_NUMBER=$PR_NUMBER"
            echo "export PR_NUMBER=$PR_NUMBER" >> $BASH_ENV
      - run:
          name: Begin SonarScan
          command: |
            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR found for branch $CIRCLE_BRANCH — skipping Sonar scan"
              circleci-agent step halt
            fi
            dotnet sonarscanner begin \
              /k:"jonwong84_jukebox-data-manager" \
              /o:"jonwong84" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.token="$SONAR_TOKEN" \
              /d:sonar.pullrequest.key="$PR_NUMBER" \
              /d:sonar.pullrequest.branch="$CIRCLE_BRANCH" \
              /d:sonar.pullrequest.base="main" \
              /d:sonar.cs.opencover.reportsPaths="/tmp/workspace/grpc.coverage.opencover.xml,/tmp/workspace/rest.coverage.opencover.xml,/tmp/workspace/managers.coverage.opencover.xml" \
              /d:sonar.tests="src/Hosts/Jukebox.DataManager.Grpc.Test,src/Hosts/Jukebox.DataManager.Rest.Test,src/Manager/Jukebox.DataManager.Managers.Test" \
              /d:sonar.test.inclusions="src/Hosts/Jukebox.DataManager.Grpc.Test/**/*.cs,src/Hosts/Jukebox.DataManager.Rest.Test/**/*.cs,src/Manager/Jukebox.DataManager.Managers.Test/**/*.cs" \
              /d:sonar.exclusions="src/Hosts/Jukebox.DataManager.Grpc/Program.cs,src/Hosts/Jukebox.DataManager.Rest/Program.cs,src/Manager/Jukebox.DataManager.Contracts/DataContracts/**/*.cs,src/Manager/Jukebox.DataManager.Managers/Mapping/AutoMapper/**/*.cs"
      - run:
          name: Build
          command: |
            dotnet build "src/Manager/Jukebox.DataManager.Contracts/Jukebox.DataManager.Contracts.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers/Jukebox.DataManager.Managers.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Grpc/Jukebox.DataManager.Grpc.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Rest/Jukebox.DataManager.Rest.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Grpc.Test/Jukebox.DataManager.Grpc.Test.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Hosts/Jukebox.DataManager.Rest.Test/Jukebox.DataManager.Rest.Test.csproj" \
              --configuration Release \
              --no-restore
            dotnet build "src/Manager/Jukebox.DataManager.Managers.Test/Jukebox.DataManager.Managers.Test.csproj" \
              --configuration Release \
              --no-restore
      - run:
          name: End SonarScan
          command: |
            dotnet sonarscanner end \
              /d:sonar.token="$SONAR_TOKEN"

  publish-grpc-image:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Log in to GHCR
          command: echo $GITHUB_TOKEN | docker login ghcr.io -u jonwong84 --password-stdin
      - run:
          name: Determine image tag
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              IMAGE_TAG=$CIRCLE_SHA1
            else
              IMAGE_TAG="beta-$CIRCLE_SHA1"
            fi
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Build Docker image
          command: |
            DOCKER_BUILDKIT=1 docker build \
              --secret id=github_token,env=GITHUB_TOKEN \
              -f src/Hosts/Jukebox.DataManager.Grpc/Dockerfile \
              -t ghcr.io/jonwong84/jukebox-datamanager-grpc:$IMAGE_TAG \
              -t ghcr.io/jonwong84/jukebox-datamanager-grpc:latest \
              .
      - run:
          name: Push Docker image
          command: |
            docker push ghcr.io/jonwong84/jukebox-datamanager-grpc:$IMAGE_TAG
            docker push ghcr.io/jonwong84/jukebox-datamanager-grpc:latest

  publish-rest-image:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Log in to GHCR
          command: echo $GITHUB_TOKEN | docker login ghcr.io -u jonwong84 --password-stdin
      - run:
          name: Determine image tag
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              IMAGE_TAG=$CIRCLE_SHA1
            else
              IMAGE_TAG="beta-$CIRCLE_SHA1"
            fi
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Build Docker image
          command: |
            DOCKER_BUILDKIT=1 docker build \
              --secret id=github_token,env=GITHUB_TOKEN \
              -f src/Hosts/Jukebox.DataManager.Rest/Dockerfile \
              -t ghcr.io/jonwong84/jukebox-datamanager-rest:$IMAGE_TAG \
              -t ghcr.io/jonwong84/jukebox-datamanager-rest:latest \
              .
      - run:
          name: Push Docker image
          command: |
            docker push ghcr.io/jonwong84/jukebox-datamanager-rest:$IMAGE_TAG
            docker push ghcr.io/jonwong84/jukebox-datamanager-rest:latest

workflows:
  build-test-scan-publish:
    jobs:
      - build-and-test-grpc:
          context: global-v1
          filters:
            branches:
              only:
                - main
                - /^feature\/.*/
      - build-and-test-rest:
          context: global-v1
          filters:
            branches:
              only:
                - main
                - /^feature\/.*/
      - build-and-test-managers:
          context: global-v1
          filters:
            branches:
              only:
                - main
                - /^feature\/.*/
      - sonar-scan:
          context: global-v1
          requires:
            - build-and-test-grpc
            - build-and-test-rest
            - build-and-test-managers
          filters:
            branches:
              only:
                - /^feature\/.*/
      - publish-grpc-image:
          context: global-v1
          requires:
            - build-and-test-grpc
            - build-and-test-rest
            - build-and-test-managers
          filters:
            branches:
              only:
                - main
                - /^feature\/.*/
      - publish-rest-image:
          context: global-v1
          requires:
            - build-and-test-grpc
            - build-and-test-rest
            - build-and-test-managers
          filters:
            branches:
              only:
                - main
                - /^feature\/.*/
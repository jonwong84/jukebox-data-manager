apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jukebox-data-manager-rest.fullname" . }}
  labels:
    {{- include "jukebox-data-manager-rest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "jukebox-data-manager-rest.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jukebox-data-manager-rest.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.env.ASPNETCORE_ENVIRONMENT | quote }}
            - name: JUKEBOX_DB_CONNECTION_STRING
              value: {{ .Values.env.JUKEBOX_DB_CONNECTION_STRING | quote }}

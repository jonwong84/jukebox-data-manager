syntax = "proto3";

import "Protos/common.proto";
import "Protos/artist.proto";
import "Protos/genre.proto";

option csharp_namespace = "Jukebox.DataManager.Grpc.Song";

package jukebox.song;

service SongService {
  rpc ListSongs (ListSongsRequest) returns (ListSongsResponse);
  rpc GetSong (GetSongRequest) returns (GetSongResponse);
  rpc CreateSong (CreateSongRequest) returns (SongResponse);
  rpc UpdateSong (UpdateSongRequest) returns (SongResponse);
  rpc DeleteSong (DeleteSongRequest) returns (jukebox.common.DeleteResponse);
}

message SongDetails {
  int32 id = 1;
  string title = 2;
  int32 artist_id = 3;
  jukebox.artist.ArtistSummary artist = 4;
  optional int32 album_id = 5;
  jukebox.artist.AlbumSummary album = 6;
  int64 duration_ticks = 7;
  repeated jukebox.genre.GenreSummary genres = 8;
  optional int32 track_number = 9;
  optional int32 bpm = 10;
  string lyrics = 11;
}

message SongSummary {
  int32 id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
}

message SongResponse {
  bool success = 1;
  string error_message = 2;
  SongDetails song = 3;
}

message GetSongResponse {
  bool success = 1;
  string error_message = 2;
  SongDetails song = 3;
}

message ListSongsRequest {
  jukebox.common.PaginationRequest pagination = 1;
  string user_id = 2;
  optional int32 artist_id = 3;
  optional int32 album_id = 4;
  optional int32 genre_id = 5;
  optional int32 min_bpm = 6;
  optional int32 max_bpm = 7;
  optional string title_search = 8;
}

message ListSongsResponse {
  bool success = 1;
  string error_message = 2;
  repeated SongSummary songs = 3;
  jukebox.common.PaginationResponse pagination = 4;
}

message GetSongRequest {
  int32 id = 1;
  string user_id = 2;
}

message CreateSongRequest {
  string user_id = 1;
  string title = 2;
  int32 artist_id = 3;
  optional int32 album_id = 4;
  int64 duration_ticks = 5;
  repeated int32 genre_ids = 6;
  optional int32 track_number = 7;
  optional int32 bpm = 8;
  string lyrics = 9;
}

message UpdateSongRequest {
  string user_id = 1;
  int32 id = 2;
  string title = 3;
  int32 artist_id = 4;
  optional int32 album_id = 5;
  int64 duration_ticks = 6;
  repeated int32 genre_ids = 7;
  optional int32 track_number = 8;
  optional int32 bpm = 9;
  string lyrics = 10;
}

message DeleteSongRequest {
  int32 id = 1;
  string user_id = 2;
}
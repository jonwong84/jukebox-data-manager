syntax = "proto3";

option csharp_namespace = "JukeboxDataManager.Grpc";

package jukebox;

service JukeboxService {
  // Songs
  rpc ListSongs (ListSongsRequest) returns (ListSongsResponse);
  rpc GetSong (GetSongRequest) returns (SongResponse);
  rpc CreateSong (CreateSongRequest) returns (SongResponse);
  rpc UpdateSong (UpdateSongRequest) returns (SongResponse);
  rpc DeleteSong (DeleteSongRequest) returns (DeleteResponse);

  // Artists
  rpc ListArtists (ListArtistsRequest) returns (ListArtistsResponse);
  rpc GetArtist (GetArtistRequest) returns (ArtistResponse);
  rpc CreateArtist (CreateArtistRequest) returns (ArtistResponse);
  rpc UpdateArtist (UpdateArtistRequest) returns (ArtistResponse);
  rpc DeleteArtist (DeleteArtistRequest) returns (DeleteResponse);

  // Albums
  rpc ListAlbums (ListAlbumsRequest) returns (ListAlbumsResponse);
  rpc GetAlbum (GetAlbumRequest) returns (AlbumResponse);
  rpc CreateAlbum (CreateAlbumRequest) returns (AlbumResponse);
  rpc UpdateAlbum (UpdateAlbumRequest) returns (AlbumResponse);
  rpc DeleteAlbum (DeleteAlbumRequest) returns (DeleteResponse);
}

// Song messages
message SongResponse {
  int32 id = 1;
  string title = 2;
  int32 artist_id = 3;
  int32 album_id = 4;
  int64 duration_seconds = 5;
  string genre = 6;
  int32 track_number = 7;
  string created_at = 8;
}

message ListSongsRequest {}
message ListSongsResponse { repeated SongResponse songs = 1; }
message GetSongRequest { int32 id = 1; }
message CreateSongRequest {
  string title = 1;
  int32 artist_id = 2;
  int32 album_id = 3;
  int64 duration_seconds = 4;
  string genre = 5;
  int32 track_number = 6;
}
message UpdateSongRequest {
  int32 id = 1;
  string title = 2;
  int32 artist_id = 3;
  int32 album_id = 4;
  int64 duration_seconds = 5;
  string genre = 6;
  int32 track_number = 7;
}
message DeleteSongRequest { int32 id = 1; }

// Artist messages
message ArtistResponse {
  int32 id = 1;
  string name = 2;
  string bio = 3;
  string created_at = 4;
}

message ListArtistsRequest {}
message ListArtistsResponse { repeated ArtistResponse artists = 1; }
message GetArtistRequest { int32 id = 1; }
message CreateArtistRequest {
  string name = 1;
  string bio = 2;
}
message UpdateArtistRequest {
  int32 id = 1;
  string name = 2;
  string bio = 3;
}
message DeleteArtistRequest { int32 id = 1; }

// Album messages
message AlbumResponse {
  int32 id = 1;
  string title = 2;
  int32 artist_id = 3;
  string release_date = 4;
  string created_at = 5;
}

message ListAlbumsRequest {}
message ListAlbumsResponse { repeated AlbumResponse albums = 1; }
message GetAlbumRequest { int32 id = 1; }
message CreateAlbumRequest {
  string title = 1;
  int32 artist_id = 2;
  string release_date = 3;
}
message UpdateAlbumRequest {
  int32 id = 1;
  string title = 2;
  int32 artist_id = 3;
  string release_date = 4;
}
message DeleteAlbumRequest { int32 id = 1; }

// Shared
message DeleteResponse { bool success = 1; }
